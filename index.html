<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ukgorboss 任务仪表板</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
// Auto-detect data source: GitHub Pages (raw) or local
const DATA_URL = window.location.hostname.includes('github.io')
  ? 'https://raw.githubusercontent.com/ukgorclawbot-stack/ukgorboss-dashboard/main/tasks.json'
  : 'tasks.json';
const POLL_INTERVAL = 15000; // 15s polling for real-time-ish sync
</script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
body { background: #0f172a; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #1e293b; }
::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
.step-card { border-left: 3px solid #475569; }
.step-thinking { border-left-color: #a855f7; }
.step-tool { border-left-color: #3b82f6; }
.step-response { border-left-color: #22c55e; }
.step-error { border-left-color: #ef4444; }
.step-coordination { border-left-color: #eab308; }
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }
.pulse-dot { animation: pulse-dot 2s infinite; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// --- Demo Data ---
const AGENTS = [
  { id: 'ukgorboss', name: 'ukgorboss', emoji: '🧠', role: '私人助理', status: 'idle' },
  { id: 'claude-code', name: 'Claude Code', emoji: '💻', role: '编程开发', status: 'idle' },
  { id: 'gemini-cli', name: 'Gemini CLI', emoji: '📄', role: '办公文档', status: 'idle' },
];

const STEP_TYPES = {
  thinking: { label: '思考', color: 'purple', bg: 'bg-purple-500/10', text: 'text-purple-400', border: 'border-purple-500' },
  tool: { label: '工具调用', color: 'blue', bg: 'bg-blue-500/10', text: 'text-blue-400', border: 'border-blue-500' },
  response: { label: '响应', color: 'green', bg: 'bg-green-500/10', text: 'text-green-400', border: 'border-green-500' },
  error: { label: '错误', color: 'red', bg: 'bg-red-500/10', text: 'text-red-400', border: 'border-red-500' },
  coordination: { label: '协调', color: 'yellow', bg: 'bg-yellow-500/10', text: 'text-yellow-400', border: 'border-yellow-500' },
};

const DEMO_TASKS = [
  {
    id: '1',
    title: '查看 Polymarket BTC 5分钟市场情况',
    status: 'completed',
    createdAt: '2026-03-15T01:15:00+08:00',
    completedAt: '2026-03-15T01:15:03+08:00',
    steps: [
      { type: 'thinking', agent: 'ukgorboss', content: '老板要看最新的5分钟BTC市场情况，调用 polymarket-btc-5m 工具获取信息', time: '01:15:00', duration: '0.2s' },
      { type: 'tool', agent: 'ukgorboss', tool: 'exec', content: 'node index.mjs info', time: '01:15:01', duration: '1.5s' },
      { type: 'response', agent: 'ukgorboss', content: '市场: Bitcoin Up or Down - March 14, 1:15PM-1:20PM ET\nUP: $0.56 | DOWN: $0.44\n剩余: 281秒', time: '01:15:02', duration: null },
      { type: 'tool', agent: 'ukgorboss', tool: 'exec', content: 'node index.mjs strategy', time: '01:15:02', duration: '1.2s' },
      { type: 'response', agent: 'ukgorboss', content: 'Binance BTC: $70,695.35\n建议方向: UP (置信度: 0.049%)\n低于阈值，跳过下单', time: '01:15:03', duration: null },
    ]
  },
  {
    id: '2',
    title: '在 Polymarket 代码中添加 Binance 自动策略',
    status: 'completed',
    createdAt: '2026-03-15T00:44:00+08:00',
    completedAt: '2026-03-15T00:49:00+08:00',
    steps: [
      { type: 'thinking', agent: 'ukgorboss', content: '老板要加一个根据 Binance 实时价格自动判断买 UP 还是 DOWN 的策略。这是编程任务，派给 Claude Code。', time: '00:44:00', duration: '0.3s' },
      { type: 'coordination', agent: 'ukgorboss', content: '分配任务 → Claude Code (编程开发)', time: '00:44:01', duration: null },
      { type: 'tool', agent: 'ukgorboss', tool: 'sessions_spawn', content: 'runtime=acp, mode=run\ntask: 添加 Binance 实时价格策略模块', time: '00:44:01', duration: '0.5s' },
      { type: 'thinking', agent: 'claude-code', content: '需要：\n1. 获取 Binance BTC/USDT 实时价格\n2. 分析5分钟K线趋势\n3. 综合评分决定方向\n4. 自动下单', time: '00:44:02', duration: '2.1s' },
      { type: 'tool', agent: 'claude-code', tool: 'read', content: 'index.mjs (读取现有代码结构)', time: '00:44:05', duration: '0.3s' },
      { type: 'tool', agent: 'claude-code', tool: 'edit', content: 'index.mjs — 新增 ~180行\n• fetchBtcPrice() - Binance API\n• fetchBtcKlines() - K线数据\n• analyzeTrend() - 4指标综合评分\n• cmdStrategy() - 单次策略\n• cmdStrategyAuto() - 连续自动', time: '00:44:08', duration: '3.2s' },
      { type: 'tool', agent: 'claude-code', tool: 'edit', content: 'index.mjs — 添加命令路由\nstrategy → cmdStrategy\nstrategy-auto → cmdStrategyAuto', time: '00:44:12', duration: '1.0s' },
      { type: 'tool', agent: 'claude-code', tool: 'exec', content: 'node --check index.mjs ✅ 语法检查通过', time: '00:44:14', duration: '0.5s' },
      { type: 'response', agent: 'claude-code', content: '代码已修改完成，语法检查通过。\n新增 strategy 和 strategy-auto 命令。', time: '00:44:15', duration: null },
      { type: 'coordination', agent: 'ukgorboss', content: 'Claude Code 任务完成，测试策略...', time: '00:44:16', duration: null },
      { type: 'tool', agent: 'ukgorboss', tool: 'exec', content: 'node index.mjs strategy', time: '00:44:17', duration: '2.0s' },
      { type: 'response', agent: 'ukgorboss', content: '策略测试通过 ✅\nBTC $70,675 | 建议: UP\n市场 UP $0.51 / DOWN $0.49', time: '00:44:19', duration: null },
    ]
  },
  {
    id: '3',
    title: '更新团队共享工具文档（添加 Gemini CLI）',
    status: 'completed',
    createdAt: '2026-03-15T01:34:00+08:00',
    completedAt: '2026-03-15T01:36:00+08:00',
    steps: [
      { type: 'thinking', agent: 'ukgorboss', content: '老板刚确认 Gemini CLI 可用，需要更新团队文档，记录版本和调用方式。', time: '01:34:00', duration: '0.2s' },
      { type: 'tool', agent: 'ukgorboss', tool: 'edit', content: 'team/shared-tools.md — 更新 Gemini CLI 条目\n版本: 0.33.1\n路径: /opt/homebrew/bin/gemini\n状态: ✅ 已认证', time: '01:34:01', duration: '0.5s' },
      { type: 'tool', agent: 'ukgorboss', tool: 'edit', content: 'TOOLS.md — 更新 Gemini CLI 调用方式\necho "prompt" | gemini', time: '01:34:02', duration: '0.3s' },
      { type: 'tool', agent: 'ukgorboss', tool: 'exec', content: 'git add -A && git commit && git push\n→ GitHub 同步完成', time: '01:34:03', duration: '2.0s' },
      { type: 'response', agent: 'ukgorboss', content: '文档已更新，GitHub 同步完成 ✅', time: '01:34:05', duration: null },
    ]
  }
];

function getAgentInfo(agentId) {
  return AGENTS.find(a => a.id === agentId) || { name: agentId, emoji: '🤖', role: '' };
}

function getStepTypeInfo(type) {
  return STEP_TYPES[type] || STEP_TYPES.response;
}

// --- Components ---
function AgentBar() {
  return (
    <div className="flex gap-2 md:gap-4 p-2 md:p-4 bg-slate-800/50 border-b border-slate-700 overflow-x-auto">
      {AGENTS.map(a => (
        <div key={a.id} className="flex items-center gap-2 px-2 md:px-3 py-1.5 bg-slate-700/50 rounded-lg flex-shrink-0">
          <span className="text-lg md:text-xl">{a.emoji}</span>
          <div>
            <div className="text-xs md:text-sm font-medium text-white whitespace-nowrap">{a.name}</div>
            <div className="text-xs text-slate-400 hidden sm:block">{a.role}</div>
          </div>
          <div className={`w-2 h-2 rounded-full ml-1 md:ml-2 ${a.status === 'active' ? 'bg-green-400 pulse-dot' : 'bg-slate-500'}`}></div>
        </div>
      ))}
    </div>
  );
}

function TaskList({ tasks, selectedId, onSelect, onClose }) {
  const statusLabel = { completed: '已完成', 'in-progress': '进行中', pending: '等待中' };
  const statusColor = { completed: 'text-green-400', 'in-progress': 'text-yellow-400', pending: 'text-slate-400' };
  return (
    <div className="w-full md:w-80 bg-slate-800/30 border-r border-slate-700 overflow-y-auto flex-shrink-0">
      <div className="p-3 border-b border-slate-700 flex items-center justify-between">
        <h2 className="text-sm font-semibold text-slate-300">📋 任务列表</h2>
        {onClose && <button onClick={onClose} className="md:hidden text-slate-400 hover:text-white text-lg">✕</button>}
      </div>
      {tasks.map(t => (
        <div key={t.id} onClick={() => onSelect(t.id)}
          className={`p-3 border-b border-slate-700/50 cursor-pointer hover:bg-slate-700/30 transition ${selectedId === t.id ? 'bg-slate-700/50' : ''}`}>
          <div className="text-sm text-white font-medium truncate">{t.title}</div>
          <div className="flex justify-between mt-1">
            <span className="text-xs text-slate-400">{new Date(t.createdAt).toLocaleString('zh-CN', {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}</span>
            <span className={`text-xs ${statusColor[t.status]}`}>{statusLabel[t.status]}</span>
          </div>
          <div className="text-xs text-slate-500 mt-1">{t.steps.length} 步骤</div>
        </div>
      ))}
    </div>
  );
}

function StepCard({ step, index }) {
  const [expanded, setExpanded] = useState(false);
  const info = getStepTypeInfo(step.type);
  const agent = getAgentInfo(step.agent);
  return (
    <div className={`step-card step-${step.type} ml-4 pl-4 py-3 relative`}>
      <div className="absolute left-[-8px] top-4 w-3 h-3 rounded-full bg-slate-600 border-2 border-slate-900"
        style={{ borderColor: STEP_TYPES[step.type]?.border?.replace('border-','') || '#475569' }}></div>
      <div className="flex items-center gap-2 mb-1">
        <span className="text-lg">{agent.emoji}</span>
        <span className="text-sm font-medium text-white">{agent.name}</span>
        <span className={`text-xs px-1.5 py-0.5 rounded ${info.bg} ${info.text}`}>{info.label}</span>
        {step.tool && <span className="text-xs px-1.5 py-0.5 rounded bg-slate-600/50 text-slate-300 font-mono">{step.tool}</span>}
        <span className="text-xs text-slate-500 ml-auto">{step.time}{step.duration ? ` (${step.duration})` : ''}</span>
      </div>
      <div onClick={() => setExpanded(!expanded)} className="cursor-pointer">
        <pre className={`text-sm text-slate-300 whitespace-pre-wrap font-mono ${expanded ? '' : 'line-clamp-2'}`}>
          {step.content}
        </pre>
        {step.content && step.content.length > 100 && (
          <span className="text-xs text-blue-400">{expanded ? '收起' : '展开...'}</span>
        )}
      </div>
    </div>
  );
}

function TaskDetail({ task }) {
  if (!task) return (
    <div className="flex-1 flex items-center justify-center text-slate-500">
      <div className="text-center">
        <div className="text-5xl mb-4">🧠</div>
        <div>选择一个任务查看详情</div>
      </div>
    </div>
  );
  const statusLabel = { completed: '已完成', 'in-progress': '进行中', pending: '等待中' };
  return (
    <div className="flex-1 overflow-y-auto p-6">
      <div className="mb-6">
        <h1 className="text-xl font-bold text-white mb-2">{task.title}</h1>
        <div className="flex gap-4 text-sm text-slate-400">
          <span>状态: <span className="text-green-400">{statusLabel[task.status]}</span></span>
          <span>开始: {new Date(task.createdAt).toLocaleString('zh-CN')}</span>
          <span>耗时: {task.completedAt ? ((new Date(task.completedAt)-new Date(task.createdAt))/1000).toFixed(1)+'s' : '-'}</span>
        </div>
      </div>
      <div className="relative">
        {task.steps.map((s, i) => <StepCard key={i} step={s} index={i} />)}
      </div>
    </div>
  );
}

function AddTaskForm({ onAdd }) {
  const [text, setText] = useState('');
  const handleSubmit = (e) => {
    e.preventDefault();
    if (!text.trim()) return;
    onAdd({
      id: Date.now().toString(),
      title: text,
      status: 'pending',
      createdAt: new Date().toISOString(),
      completedAt: null,
      steps: [{ type: 'thinking', agent: 'ukgorboss', content: `收到任务: ${text}，正在处理...`, time: new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'}), duration: '0.1s' }]
    });
    setText('');
  };
  return (
    <form onSubmit={handleSubmit} className="p-3 border-t border-slate-700 bg-slate-800/30">
      <div className="flex gap-2">
        <input value={text} onChange={e => setText(e.target.value)} placeholder="输入新任务..."
          className="flex-1 px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-sm text-white placeholder-slate-400 focus:outline-none focus:border-blue-500" />
        <button type="submit" className="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white text-sm rounded-lg transition">
          分配
        </button>
      </div>
    </form>
  );
}

function App() {
  const [tasks, setTasks] = useState(DEMO_TASKS);
  const [selectedId, setSelectedId] = useState(null);
  const [showList, setShowList] = useState(true); // mobile: toggle list/detail view
  const [lastSync, setLastSync] = useState(null);
  const [syncing, setSyncing] = useState(false);

  // Poll for updates from GitHub / remote
  useEffect(() => {
    const fetchTasks = async () => {
      try {
        setSyncing(true);
        const resp = await fetch(DATA_URL + '?t=' + Date.now());
        if (resp.ok) {
          const data = await resp.json();
          if (data.tasks) {
            setTasks(data.tasks);
            setLastSync(new Date().toLocaleTimeString('zh-CN'));
          }
        }
      } catch (e) { /* fallback to local data */ }
      setSyncing(false);
    };
    fetchTasks();
    const interval = setInterval(fetchTasks, POLL_INTERVAL);
    return () => clearInterval(interval);
  }, []);

  // Save to localStorage as cache
  useEffect(() => {
    localStorage.setItem('ukgorboss-tasks', JSON.stringify(tasks));
  }, [tasks]);

  const selected = tasks.find(t => t.id === selectedId) || null;

  const addTask = (task) => {
    setTasks(prev => [task, ...prev]);
    setSelectedId(task.id);
  };

  return (
    <div className="h-screen flex flex-col overflow-hidden">
      <header className="p-3 md:p-4 bg-slate-800 border-b border-slate-700 flex items-center gap-2 md:gap-3">
        <span className="text-xl md:text-2xl">🧠</span>
        <div className="min-w-0">
          <h1 className="text-base md:text-lg font-bold text-white truncate">ukgorboss 任务仪表板</h1>
          <p className="text-xs text-slate-400 hidden sm:block">私人助理 · 任务流程可视化</p>
        </div>
        <div className="ml-auto flex items-center gap-2 md:gap-3 flex-shrink-0">
          <div className={`w-2 h-2 rounded-full ${syncing ? 'bg-yellow-400 pulse-dot' : 'bg-green-400'}`}></div>
          <span className="text-xs text-slate-500 hidden sm:inline">{lastSync ? `同步于 ${lastSync}` : '同步中...'}</span>
          <span className="text-xs text-slate-600 hidden sm:inline">|</span>
          <span className="text-xs text-slate-500">{tasks.length} 任务</span>
        </div>
      </header>
      <AgentBar />
      <div className="flex flex-1 overflow-hidden flex-col md:flex-row">
        {/* Mobile: show list OR detail; Desktop: show both */}
        <div className={`${selected && !showList ? 'hidden md:flex' : 'flex'} flex-col md:flex-row flex-1 overflow-hidden`}>
          <div className={`${selected && !showList ? 'hidden md:flex' : 'flex'} flex-col`}>
            <TaskList tasks={tasks} selectedId={selectedId} onSelect={(id) => { setSelectedId(id); setShowList(false); }} onClose={selected ? () => setShowList(false) : null} />
            <AddTaskForm onAdd={(task) => { addTask(task); setShowList(false); }} />
          </div>
          <div className={`${!selected ? 'hidden md:flex' : 'flex'} flex-1 overflow-hidden`}>
            {selected && (
              <div className="w-full">
                {/* Mobile back button */}
                <div className="md:hidden p-2 bg-slate-800/50 border-b border-slate-700">
                  <button onClick={() => setShowList(true)} className="text-sm text-blue-400 hover:text-blue-300">← 返回列表</button>
                </div>
                <TaskDetail task={selected} />
              </div>
            )}
            {!selected && <TaskDetail task={null} />}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
